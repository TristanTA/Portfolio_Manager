name: Weekly Audit

on:
  workflow_dispatch: {}
  schedule:
    # Mondays at 09:00 America/Denver ≈ 16:00 UTC (adjust if you want a different time)
    - cron: "0 16 * * 1"

jobs:
  run-weekly-audit:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run weekly audit batch
        shell: cmd
        run: |
          call run_weekly_audit.bat